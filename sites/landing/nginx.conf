# Redirección de HTTP a HTTPS
# Unprivileged ports (8080/8443): nginx runs as non-root (nginx-unprivileged),
# which cannot bind <1024. Host mapping stays 443 -> 8443 via docker -p.
server {
    listen 8080;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 8443 ssl;
    server_name agevega.com www.agevega.com dev.agevega.com;

    absolute_redirect off;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # SSG-style fallback: serve $uri.html for clean URLs, real 404 for missing pages
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Custom 404 page (built by Astro to dist/404.html)
    error_page 404 /404.html;

    # Endpoint para el Health Check de AWS (ALB)
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
