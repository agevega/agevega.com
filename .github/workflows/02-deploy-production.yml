name: 02 Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., v1.0.0)"
        required: true

env:
  AWS_REGION: eu-south-2
  SSM_PARAM_NAME: "/agevegacom/production/image_tag"
  PROJECT_NAME: agevegacom

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Discover ASG name from SSM
        id: discover
        run: |
          ASG_NAME=$(aws ssm get-parameter \
            --name "/${{ env.PROJECT_NAME }}/05-high-availability/01-ec2-autoscaling/asg-name" \
            --query "Parameter.Value" --output text)
          echo "ASG_NAME=$ASG_NAME" >> $GITHUB_ENV
          echo "Discovered ASG: $ASG_NAME"

      - name: Update Image Tag in SSM (shared)
        run: |
          echo "Updating ${{ env.SSM_PARAM_NAME }} -> ${{ inputs.image_tag }}"
          aws ssm put-parameter \
            --name "${{ env.SSM_PARAM_NAME }}" \
            --value "${{ inputs.image_tag }}" \
            --type "String" \
            --overwrite

      - name: Start Instance Refresh
        run: |
          echo "Starting Instance Refresh for ASG: ${{ env.ASG_NAME }}"
          
          # Check if a refresh is already in progress
          REFRESH_ID=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --query "InstanceRefreshes[?Status=='InProgress'].InstanceRefreshId" \
            --output text)
            
          if [ -n "$REFRESH_ID" ]; then
            echo "Instance Refresh already in progress: $REFRESH_ID"
            echo "Cancelling previous refresh..."
            aws autoscaling cancel-instance-refresh --auto-scaling-group-name "${{ env.ASG_NAME }}"
            
            echo "Waiting for cleanup..."
            while true; do
                STATUS=$(aws autoscaling describe-instance-refreshes \
                    --auto-scaling-group-name "${{ env.ASG_NAME }}" \
                    --instance-refresh-ids "$REFRESH_ID" \
                    --query "InstanceRefreshes[0].Status" \
                    --output text)
                
                echo "Current status: $STATUS"
                
                if [[ "$STATUS" == "Cancelled" || "$STATUS" == "Failed" || "$STATUS" == "Successful" ]]; then
                    echo "Previous refresh stopped."
                    break
                fi
                
                if [ -z "$STATUS" ]; then
                     echo "Status not found, assuming finished."
                     break
                fi
                
                sleep 10
            done
          fi

          echo "Triggering new refresh..."
          NEW_REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 300}' \
            --query 'InstanceRefreshId' \
            --output text)
          
          echo "Instance Refresh started: $NEW_REFRESH_ID"
          echo "Waiting for refresh to complete (this may take several minutes)..."
          
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ env.ASG_NAME }}" \
              --instance-refresh-ids "$NEW_REFRESH_ID" \
              --query "InstanceRefreshes[0].Status" \
              --output text)
              
            echo "[$(date +%T)] Refresh Status: $STATUS"
            
            if [ "$STATUS" == "Successful" ]; then
              echo "Instance refresh completed successfully."
              break
            fi
            
            if [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelling" || "$STATUS" == "Cancelled" ]]; then
              echo "Instance refresh failed or cancelled. Aborting."
              exit 1
            fi
            
            sleep 30
          done

      - name: Invalidate CloudFront Caches (landing + academy)
        if: success()
        run: |
          set -euo pipefail

          invalidate() {
            local site="$1" ssm_key="$2"
            local dist_id inv_id
            dist_id=$(aws ssm get-parameter --name "$ssm_key" --query "Parameter.Value" --output text 2>/dev/null || echo "")
            if [ -z "$dist_id" ] || [ "$dist_id" == "None" ]; then
              echo "::error::$site CloudFront Distribution ID not found at $ssm_key"
              exit 1
            fi

            echo "Invalidating $site distribution: $dist_id"
            inv_id=$(aws cloudfront create-invalidation \
              --distribution-id "$dist_id" --paths "/*" \
              --query "Invalidation.Id" --output text)

            echo "Waiting for $site invalidation $inv_id to complete..."
            aws cloudfront wait invalidation-completed \
              --distribution-id "$dist_id" --id "$inv_id"
            echo "$site invalidation $inv_id completed."
          }

          invalidate landing "/agevegacom/05-high-availability/03-cloudfront/cloudfront-distribution-id-landing"
          invalidate academy "/agevegacom/05-high-availability/03-cloudfront/cloudfront-distribution-id-academy"
