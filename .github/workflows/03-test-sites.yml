name: 03 Test Sites

on:
  pull_request:
    paths:
      - 'sites/**'
      - '.github/workflows/03-test-sites.yml'
      - 'sites/.prettierrc'
      - 'sites/.prettierignore'
      - 'sites/**/.eslintrc.cjs'
  push:
    branches:
      - master
    paths:
      - 'sites/**'
      - '.github/workflows/03-test-sites.yml'
      - 'sites/.prettierrc'
      - 'sites/.prettierignore'
      - 'sites/**/.eslintrc.cjs'

jobs:
  test:
    name: Test ${{ matrix.site }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: [landing, academy]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Required by Astro 6 (engines: ">=22.12.0"). The astro CLI shebang is
          # `#!/usr/bin/env node`, so even under `bun run`, scripts delegate to node.
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Must match `oven/bun:1.3` in sites/*/Dockerfile (text-format bun.lock requires bun >=1.2).
          bun-version: '1.3'

      - name: Install dependencies (${{ matrix.site }})
        working-directory: sites/${{ matrix.site }}
        run: bun install --frozen-lockfile

      - name: Build (${{ matrix.site }})
        working-directory: sites/${{ matrix.site }}
        env:
          # Landing requires PUBLIC_API_URL via envField (optional: false).
          # Academy has no required env vars today.
          PUBLIC_API_URL: https://stub.example.com
          PUBLIC_APP_VERSION: ci-test
        run: bun run build

      - name: Test (${{ matrix.site }})
        working-directory: sites/${{ matrix.site }}
        env:
          PUBLIC_API_URL: https://stub.example.com
          PUBLIC_APP_VERSION: ci-test
        run: bun run test

  cert-san-check:
    name: Verify ALB cert SANs
    runs-on: ubuntu-latest
    # Only on push to master — not needed on every PR, and requires AWS creds
    if: github.event_name == 'push'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-south-2

      - name: Check ALB cert SANs
        run: |
          set -euo pipefail

          # Find the cert ARN for agevega.com in eu-south-2 (ALB cert)
          CERT_ARN=$(aws acm list-certificates \
            --query "CertificateSummaryList[?DomainName=='agevega.com'].CertificateArn | [0]" \
            --output text)

          if [ "$CERT_ARN" == "None" ] || [ -z "$CERT_ARN" ]; then
            echo "::error::No ACM certificate found for agevega.com in eu-south-2"
            exit 1
          fi

          echo "Found cert: $CERT_ARN"
          SANS=$(aws acm describe-certificate \
            --certificate-arn "$CERT_ARN" \
            --query "Certificate.SubjectAlternativeNames" \
            --output text)

          echo "SANs: $SANS"

          MISSING=0
          for EXPECTED in "*.agevega.com" "*.academy.agevega.com"; do
            if echo "$SANS" | grep -qw "$EXPECTED"; then
              echo "✅ Found: $EXPECTED"
            else
              echo "::error::❌ Missing SAN: $EXPECTED"
              MISSING=1
            fi
          done

          if [ "$MISSING" -eq 1 ]; then
            echo "::error::ALB cert is missing required SANs — www.academy.agevega.com will 502"
            exit 1
          fi

          echo "All required SANs present."
