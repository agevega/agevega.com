name: 01 Deploy to EC2

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., v0.1.3)"
        required: true
        default: "latest"

env:
  AWS_REGION: eu-south-2
  PROJECT_NAME: agevegacom
  EC2_HOST: ""
  EC2_USER: ec2-user

jobs:
  deploy:
    name: Deploy to Bastion
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get SSM Parameters
        id: get-ssm
        run: |
          echo "Fetching configuration from SSM..."
          ECR_REPO=$(aws ssm get-parameter --name "/${{ env.PROJECT_NAME }}/02-shared-resources/01-ecr-repositories/ecr-repository" --query "Parameter.Value" --output text)
          CLOUDFRONT_ID=$(aws ssm get-parameter --name "/${{ env.PROJECT_NAME }}/04-bastion-host/04-cloudfront/cloudfront-distribution-id" --query "Parameter.Value" --output text)
          BASTION_IP=$(aws ssm get-parameter --name "/${{ env.PROJECT_NAME }}/04-bastion-host/01-eip/bastion-ip" --query "Parameter.Value" --output text)
          
          echo "Found Bastion IP: $BASTION_IP"
          echo "EC2_HOST=$BASTION_IP" >> $GITHUB_ENV
          echo "ECR_REPO=$ECR_REPO" >> $GITHUB_OUTPUT
          echo "CLOUDFRONT_ID=$CLOUDFRONT_ID" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deployment script
        run: |
          scp -i ~/.ssh/id_rsa scripts/01_deploy_frontend.sh ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:~/
          ssh -i ~/.ssh/id_rsa ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "chmod +x ~/01_deploy_frontend.sh"

      - name: Deploy on EC2
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: ${{ steps.get-ssm.outputs.ECR_REPO }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          FULL_IMAGE_URI="$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"
          echo "Deploying image: $FULL_IMAGE_URI"

          # Login to ECR on the remote instance (piping credentials)
          aws ecr get-login-password --region $AWS_REGION | \
          ssh -i ~/.ssh/id_rsa ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
          "docker login --username AWS --password-stdin $ECR_REGISTRY"

          # Execute the deployment script
          ssh -i ~/.ssh/id_rsa ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
          "./01_deploy_frontend.sh $FULL_IMAGE_URI"

      - name: Invalidate CloudFront Cache
        if: success()
        env:
          CLOUDFRONT_ID: ${{ steps.get-ssm.outputs.CLOUDFRONT_ID }}
        run: |
          if [ -n "$CLOUDFRONT_ID" ] && [ "$CLOUDFRONT_ID" != "None" ]; then
            echo "Invalidating CloudFront Distribution: $CLOUDFRONT_ID"
            aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID --paths "/*"
          else
            echo "CloudFront Distribution ID not found in SSM. Skipping invalidation."
          fi
